# 需求描述补全优化规则 v5.0

version: "5.0"

output_fields:
  demand_type:
    name: "需求类型"
    values: ["普通需求", "价值需求"]
    auto_derived: true
    derivation_rule: "A级/B级→价值需求 | C级/D级→普通需求"
  
  demand_module:
    name: "需求模块"
    values: ["仓储与物流域", "研发域", "供应链与制造域", "营销域"]
    auto_derived: false
    derivation_guide: |
      仓储与物流域：仓储管理、物流调度、库存优化
      研发域：系统开发、技术架构、工具建设、内部平台
      供应链与制造域：供应链协同、制造流程、采购管理
      营销域：侵权风控、品牌对标、产品上架、市场运营、客户服务
      注意：参考 rules/company_context.yaml 中已记录的系统与模块关联
  
  title:
    name: "标题"
    description: "用一句话简单描述需求的核心内容"
    max_length: 50
    auto_derived: false
  
  background:
    name: "背景"
    description: "问题背景与现状说明"
    auto_derived: false
  
  pain_points:
    name: "业务痛点"
    description: "描述当前业务的痛点"
    auto_derived: false
  
  description:
    name: "需求描述"
    description: "需求点补充描述更具体详细"
    auto_derived: false
  
  label:
    name: "标签"
    values: ["战略", "经营", "日常", "无效型"]
    auto_derived: true
    derivation_rule: "A级≥80→战略 | B级60-79→经营 | C级40-59→日常 | D级<40→无效型"
  
  priority:
    name: "优先级"
    values: ["P0", "P1", "P2", "P3"]
    auto_derived: true
    derivation_rule: "A级→P0 | B级→P1 | C级→P2 | D级→P3"
  
  ai_suggestions:
    name: "AI建议"
    description: "基于评分维度和PM框架分析，给出需求迭代优化建议，助力开发人员理解和推进"
    auto_derived: true
    generation_rules:
      - dimension: "业务价值"
        check: "是否包含量化指标？当前值vs目标值？"
        suggestion_template: "建议补充量化指标：当前{metric}是多少？目标提升到多少？"
      - dimension: "战略匹配度"
        check: "是否对齐OKR？归属哪个战略目标？"
        suggestion_template: "建议对齐年度OKR，明确归属哪个战略目标"
      - dimension: "影响范围"
        check: "是否列出直接受益部门/岗位/用户规模？"
        suggestion_template: "建议列出直接受益部门/岗位清单及用户规模"
      - dimension: "投入产出比"
        check: "是否明确技术栈、外部依赖、预估人月？"
        suggestion_template: "建议明确技术栈选型、外部依赖、预估开发人月"
      - dimension: "紧急程度"
        check: "是否有刚性时间节点？"
        suggestion_template: "建议补充刚性时间节点"
      - dimension: "实施复杂度"
        check: "是否需要拆分阶段？一次性交付风险？"
        suggestion_template: "建议拆分阶段交付，降低一次性交付风险"
      - dimension: "开发视角"
        check: "开发人员能否直接理解并开始工作？验收标准是否明确？"
        suggestion_template: "建议补充验收标准、技术方案要点、接口依赖说明"
      - dimension: "缺失信息"
        check: "成功度量指标、技术风险评估、跨部门协同机制是否明确？"
        suggestion_template: "建议补充：{缺失项列表}"

score_to_label_mapping:
  - min_score: 80
    max_score: 100
    grade: "A"
    label: "战略"
    priority: "P0"
    demand_type: "价值需求"
  - min_score: 60
    max_score: 79
    grade: "B"
    label: "经营"
    priority: "P1"
    demand_type: "价值需求"
  - min_score: 40
    max_score: 59
    grade: "C"
    label: "日常"
    priority: "P2"
    demand_type: "普通需求"
  - min_score: 0
    max_score: 39
    grade: "D"
    label: "无效型"
    priority: "P3"
    demand_type: "普通需求"

quality_checks:
  - field: "title"
    check: "是否用一句话描述了需求核心内容"
    min_requirement: true
  - field: "background"
    check: "是否描述了当前状况和存在的问题"
    min_requirement: true
  - field: "pain_points"
    check: "是否列出了至少1个具体痛点及其表现"
    min_requirement: true
  - field: "description"
    check: "是否详细描述了需求点和预期效果"
    min_requirement: true
  - field: "demand_module"
    check: "是否选择了正确的需求模块"
    min_requirement: true

confidence_levels:
  confirmed: "用户明确提供的信息"
  inferred: "根据上下文合理推测的信息"
  assumed: "AI基于经验假设的信息（需要用户确认）"

insufficient_info_rules:
  missing_threshold: 3
  action: "pause_and_ask"
