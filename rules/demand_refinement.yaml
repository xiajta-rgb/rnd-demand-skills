# 需求描述补全优化规则 v4.0

version: "4.0"

# 最终录入字段定义
output_fields:
  demand_type:
    name: "需求类型"
    description: "普通需求 / 价值需求"
    values: ["普通需求", "价值需求"]
    auto_derived: true
    derivation_rule: "A级/B级→价值需求 | C级/D级→普通需求"
  
  demand_module:
    name: "需求模块"
    description: "需求所属业务域"
    values: ["仓储与物流域", "研发域", "供应链与制造域", "营销域"]
    auto_derived: false
    guide: "根据需求涉及的核心业务流程判断归属域"
  
  title:
    name: "标题"
    description: "用一句话简单描述需求的核心内容"
    max_length: 50
    auto_derived: false
  
  background:
    name: "背景"
    description: "问题背景与现状说明"
    auto_derived: false
  
  pain_points:
    name: "业务痛点"
    description: "描述当前业务的痛点"
    auto_derived: false
  
  description:
    name: "需求描述"
    description: "需求点补充描述更具体详细"
    auto_derived: false
  
  label:
    name: "标签"
    description: "需求类型标签（由评分自动推导）"
    values: ["战略", "经营", "日常", "无效型"]
    auto_derived: true
    derivation_rule: "A级≥80→战略 | B级60-79→经营 | C级40-59→日常 | D级<40→无效型"
  
  priority:
    name: "优先级"
    description: "需求优先级（由评分自动推导）"
    values: ["P0", "P1", "P2", "P3"]
    auto_derived: true
    derivation_rule: "A级≥80→P0(立即处理) | B级60-79→P1(本周处理) | C级40-59→P2(迭代内处理) | D级<40→P3(排期处理)"

# 补全质量评估标准（不包含自动推导字段）
quality_checks:
  - field: "title"
    check: "是否用一句话描述了需求核心内容"
    min_requirement: true
  - field: "background"
    check: "是否描述了当前状况和存在的问题"
    min_requirement: true
  - field: "pain_points"
    check: "是否列出了至少1个具体痛点及其表现"
    min_requirement: true
  - field: "description"
    check: "是否详细描述了需求点和预期效果"
    min_requirement: true
  - field: "demand_module"
    check: "是否选择了正确的需求模块"
    min_requirement: true

# 评分→标签→优先级 自动映射表
score_to_label_mapping:
  - min_score: 80
    max_score: 100
    grade: "A"
    label: "战略"
    priority: "P0"
    demand_type: "价值需求"
  - min_score: 60
    max_score: 79
    grade: "B"
    label: "经营"
    priority: "P1"
    demand_type: "价值需求"
  - min_score: 40
    max_score: 59
    grade: "C"
    label: "日常"
    priority: "P2"
    demand_type: "普通需求"
  - min_score: 0
    max_score: 39
    grade: "D"
    label: "无效型"
    priority: "P3"
    demand_type: "普通需求"

# 补全置信度标记
confidence_levels:
  confirmed: "用户明确提供的信息"
  inferred: "根据上下文合理推测的信息"
  assumed: "AI基于经验假设的信息（需要用户确认）"

# 补全不合格处理规则
insufficient_info_rules:
  missing_threshold: 3
  action: "pause_and_ask"
