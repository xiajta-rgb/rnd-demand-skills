# 需求评审评分规则判定文件 v3.0
version: "3.0"
total_score: 100

grade_rules:
  A: {min: 80, max: 100, type: "战略型需求", action: "独立立项评审", label: "战略", priority: "P0", demand_type: "价值需求"}
  B: {min: 60, max: 79, type: "经营优化型需求", action: "纳入评审流程", label: "经营", priority: "P1", demand_type: "价值需求"}
  C: {min: 40, max: 59, type: "日常改进型需求", action: "轻量快速处理", label: "日常", priority: "P2", demand_type: "普通需求"}
  D: {min: 0, max: 39, type: "无效/暂不支持型", action: "驳回并说明原因", label: "无效型", priority: "P3", demand_type: "普通需求"}

dedup_rules:
  enabled: true
  similarity_threshold: "标题或描述高度相似（关键词重叠≥60%）"
  action: "提示用户需求库中已存在相似需求，询问是否合并/更新/新建"
  output_template: |
    ⚠️ 需求库中已存在相似需求：
    {existing_id}  {existing_title}
    是否：1.合并到已有需求 2.更新已有需求 3.作为新需求继续

status_flow:
  transitions:
    - from: "待评审"
      to: ["已评审"]
      trigger: "评分完成"
    - from: "已评审"
      to: ["已立项", "已驳回", "已暂缓"]
      trigger: "用户确认决策"
    - from: "已暂缓"
      to: ["已立项", "已驳回"]
      trigger: "用户重新决策"
    - from: "已立项"
      to: ["开发中", "已取消"]
      trigger: "项目启动或取消"
  status_commands:
    "立项D001": "已评审→已立项"
    "驳回D001": "已评审→已驳回"
    "暂缓D001": "已评审→已暂缓"
    "取消D001": "已立项→已取消"

company_context_rules:
  record_triggers:
    - "用户提到公司内部系统名称"
    - "用户提到部门/团队名称"
    - "用户提到外部数据源/工具"
    - "用户提到业务规则/流程"
  do_not_record:
    - "通用技术术语"
    - "个人偏好"
    - "临时性描述"

dimensions:
  business_value:
    name: "业务价值"
    weight: 25
    reverse_score: false
    pm_frameworks:
      - name: "RICE - Impact"
        description: "该需求对用户/业务的影响程度"
        scoring_guide: "影响全体用户或核心业务流程=高分，仅影响个别用户=低分"
      - name: "Jobs-to-be-Done"
        description: "用户雇佣产品完成的真实任务是什么"
        scoring_guide: "解决核心Job=高分，解决边缘Job=低分"
      - name: "North Star Metric"
        description: "是否直接影响北极星指标"
        scoring_guide: "直接影响=高分，间接或无关=低分"
      - name: "Amazon Working Backwards"
        description: "从客户视角反推：客户是否真的需要？"
        scoring_guide: "客户强需求=高分，假设需求=低分"
    rules:
      - min_score: 21
        max_score: 25
        condition: "显著提升收入/降本（≥10%），或解决核心业务痛点，直接影响北极星指标，用户核心Job被满足"
      - min_score: 16
        max_score: 20
        condition: "提升效率/降低差错（≥20%），或解决重要业务环节问题，有明确客户验证"
      - min_score: 11
        max_score: 15
        condition: "局部优化，效率提升<20%，或解决非核心痛点，缺乏客户验证"
      - min_score: 0
        max_score: 10
        condition: "无明确业务价值，或仅个人习惯优化，无客户需求支撑"

  strategy_alignment:
    name: "战略匹配度"
    weight: 20
    reverse_score: false
    pm_frameworks:
      - name: "OKR Alignment"
        description: "需求是否对齐公司/部门级OKR"
        scoring_guide: "直接支撑O或KR=高分，与OKR无关=低分"
      - name: "Opportunity Solution Trees (Teresa Torres)"
        description: "需求是否在当前机会树上"
        scoring_guide: "在主干机会上=高分，在分支或无关=低分"
    rules:
      - min_score: 17
        max_score: 20
        condition: "完全匹配公司核心战略重点，直接支撑公司级OKR，位于机会树主干"
      - min_score: 13
        max_score: 16
        condition: "部分匹配战略方向，支持部门级OKR，在机会树分支上"
      - min_score: 9
        max_score: 12
        condition: "与战略方向无直接冲突，但未对齐任何OKR"
      - min_score: 0
        max_score: 8
        condition: "与公司战略重点无关，或存在方向冲突，偏离机会树"

  impact_scope:
    name: "影响范围"
    weight: 15
    reverse_score: false
    scoring_note: "影响范围需区分核心业务场景vs非核心场景"
    pm_frameworks:
      - name: "RICE - Reach"
        description: "该需求影响多少用户/客户"
        scoring_guide: "影响全体或大量用户=高分，影响个别用户=低分；需结合业务重要性判断"
      - name: "Crossing the Chasm (Geoffrey Moore)"
        description: "需求处于市场采纳的哪个阶段"
        scoring_guide: "跨越鸿沟阶段=高分，早期采纳者阶段=中等，滞后=低分"
      - name: "Impact Depth Check"
        description: "影响深度：核心业务场景还是辅助场景"
        scoring_guide: "核心业务场景(合规/营收/客户)=加分，辅助场景(行政/汇报/个人)=减分"
    rules:
      - min_score: 13
        max_score: 15
        condition: "影响3个及以上部门/业务链路，RICE Reach覆盖全体用户，且为核心业务场景"
      - min_score: 9
        max_score: 12
        condition: "影响2个部门/多个岗位，RICE Reach覆盖部分用户，且为业务相关场景"
      - min_score: 5
        max_score: 8
        condition: "仅影响单个部门的1-2个岗位，或影响面广但仅为非核心辅助场景"
      - min_score: 0
        max_score: 4
        condition: "仅个人使用，或仅个人环境问题，RICE Reach极低"

  roi:
    name: "投入产出比"
    weight: 15
    reverse_score: false
    override_rules:
      - condition: "收益为零或无明确收益预期"
        action: "force_max_score"
        value: 4
        reason: "零收益时ROI必为低分，不论投入多低"
    pm_frameworks:
      - name: "RICE - Effort & Confidence"
        description: "投入多少资源？信心度多高？"
        scoring_guide: "低Effort高Confidence=高分，高Effort低Confidence=低分；收益为零时强制≤4分"
    rules:
      - min_score: 13
        max_score: 15
        condition: "低资源投入，高预期收益，ROI≥3:1，RICE Effort低且Confidence高"
      - min_score: 9
        max_score: 12
        condition: "资源投入合理，收益明确，ROI在1:1-3:1之间，Confidence中等"
      - min_score: 5
        max_score: 8
        condition: "资源投入较高，收益一般，ROI<1:1，Confidence偏低"
      - min_score: 0
        max_score: 4
        condition: "资源投入高，无明确收益预期，Confidence极低，或收益为零"

  urgency:
    name: "紧急程度"
    weight: 15
    reverse_score: false
    pm_frameworks:
      - name: "Time-Sensitive Opportunity"
        description: "是否存在时间敏感的机会窗口"
        scoring_guide: "窗口即将关闭=高分，无时间压力=低分"
    rules:
      - min_score: 13
        max_score: 15
        condition: "存在明确合规/履约/客户风险，或有刚性时间节点，机会窗口即将关闭"
      - min_score: 9
        max_score: 12
        condition: "影响业务正常推进，有较明确的时间要求"
      - min_score: 5
        max_score: 8
        condition: "无明确时间压力，属于可延后优化项"
      - min_score: 0
        max_score: 4
        condition: "无紧急性，属于长期优化或非必要需求"

  implementation_complexity:
    name: "实施复杂度"
    weight: 10
    reverse_score: true
    pm_frameworks:
      - name: "Technical Debt Assessment"
        description: "是否增加技术债务"
        scoring_guide: "减少技术债=高分，增加技术债=低分"
    rules:
      - min_score: 8
        max_score: 10
        condition: "技术实现简单，无跨部门依赖，可快速落地，不增加技术债"
      - min_score: 5
        max_score: 7
        condition: "实现难度中等，依赖可控，无重大风险"
      - min_score: 2
        max_score: 4
        condition: "实现难度较高，存在跨部门协同成本，或数据基础不完善"
      - min_score: 0
        max_score: 1
        condition: "实现难度极高，依赖复杂，存在技术瓶颈或重大风险，增加技术债"
