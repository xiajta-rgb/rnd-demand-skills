# 需求评审评分规则判定文件
# 用于 RnDDemandGovernanceSkill 自动化打分、定级、分类
version: "1.0"
total_score: 100

# 分级判定规则
grade_rules:
  A: {min: 80, type: "战略型需求", action: "独立立项评审", priority: "高优先级"}
  B: {min: 60, max: 79, type: "经营优化型需求", action: "纳入评审流程，按价值排序", priority: "中优先级"}
  C: {min: 40, max: 59, type: "日常改进型需求", action: "轻量快速处理", priority: "低优先级"}
  D: {max: 39, type: "无效/暂不支持型", action: "驳回/暂缓，说明原因", priority: "不通过"}

# 评分维度定义
dimensions:
  # 业务价值（25分，正向计分）
  business_value:
    name: "业务价值"
    weight: 25
    reverse_score: false
    rules:
      - min_score: 21
        max_score: 25
        condition: "显著提升收入/降本（≥10%），或解决核心业务痛点，直接影响公司经营目标"
        keywords: ["收入提升", "降本", "核心业务", "痛点", "经营目标", "显著提升"]
      - min_score: 16
        max_score: 20
        condition: "提升效率/降低差错（≥20%），或解决重要业务环节问题"
        keywords: ["效率提升", "降低差错", "重要业务", "业务环节"]
      - min_score: 11
        max_score: 15
        condition: "局部优化，效率提升<20%，或解决非核心痛点"
        keywords: ["局部优化", "非核心", "小幅度提升"]
      - min_score: 0
        max_score: 10
        condition: "无明确业务价值，或仅个人习惯优化、局部临时需求"
        keywords: ["个人", "习惯", "临时", "无价值"]

  # 战略匹配度（20分，正向计分）
  strategy_alignment:
    name: "战略匹配度"
    weight: 20
    reverse_score: false
    rules:
      - min_score: 17
        max_score: 20
        condition: "完全匹配公司当前核心战略重点，属于年度重点建设方向"
        keywords: ["核心战略", "年度重点", "战略重点", "核心方向"]
      - min_score: 13
        max_score: 16
        condition: "部分匹配战略方向，支持部门级重点目标"
        keywords: ["部门重点", "部分匹配", "部门目标"]
      - min_score: 9
        max_score: 12
        condition: "与战略方向无直接冲突，但无明显匹配度"
        keywords: ["无冲突", "一般", "常规"]
      - min_score: 0
        max_score: 8
        condition: "与公司战略重点无关，或存在方向冲突"
        keywords: ["无关", "冲突", "偏离"]

  # 影响范围（15分，正向计分）
  impact_scope:
    name: "影响范围"
    weight: 15
    reverse_score: false
    rules:
      - min_score: 13
        max_score: 15
        condition: "影响3个及以上部门/业务链路，具备高复用价值"
        keywords: ["跨部门", "多部门", "3个", "复用", "全链路"]
      - min_score: 9
        max_score: 12
        condition: "影响2个部门/多个岗位，具备一定复用价值"
        keywords: ["2个部门", "多岗位", "协同"]
      - min_score: 5
        max_score: 8
        condition: "仅影响单个部门的1-2个岗位，复用价值低"
        keywords: ["单部门", "岗位", "局部"]
      - min_score: 0
        max_score: 4
        condition: "仅个人使用，无跨岗位/跨部门影响"
        keywords: ["个人", "无影响", "独立"]

  # 投入产出比（15分，正向计分）
  roi:
    name: "投入产出比"
    weight: 15
    reverse_score: false
    rules:
      - min_score: 13
        max_score: 15
        condition: "低资源投入，高预期收益，ROI≥3:1"
        keywords: ["低投入", "高收益", "ROI", "高效"]
      - min_score: 9
        max_score: 12
        condition: "资源投入合理，收益明确，ROI在1:1-3:1之间"
        keywords: ["合理", "收益明确", "中等"]
      - min_score: 5
        max_score: 8
        condition: "资源投入较高，收益一般，ROI<1:1"
        keywords: ["投入高", "收益一般", "低效"]
      - min_score: 0
        max_score: 4
        condition: "资源投入高，无明确收益预期，或投入产出严重失衡"
        keywords: ["高投入", "无收益", "失衡"]

  # 紧急程度（15分，正向计分）
  urgency:
    name: "紧急程度"
    weight: 15
    reverse_score: false
    rules:
      - min_score: 13
        max_score: 15
        condition: "存在明确合规/履约/客户风险，或有刚性时间节点要求"
        keywords: ["合规", "风险", "客户影响", "刚性", "紧急", "截止"]
      - min_score: 9
        max_score: 12
        condition: "影响业务正常推进，有较明确的时间要求"
        keywords: ["业务推进", "时间要求", "较急"]
      - min_score: 5
        max_score: 8
        condition: "无明确时间压力，属于可延后优化项"
        keywords: ["延后", "优化", "可等待"]
      - min_score: 0
        max_score: 4
        condition: "无紧急性，属于长期优化或非必要需求"
        keywords: ["不紧急", "长期", "非必要"]

  # 实施复杂度（10分，反向计分：难度越低得分越高）
  implementation_complexity:
    name: "实施复杂度"
    weight: 10
    reverse_score: true
    rules:
      - min_score: 8
        max_score: 10
        condition: "技术实现简单，无跨部门依赖，可快速落地"
        keywords: ["简单", "快速", "无依赖", "易实现"]
      - min_score: 5
        max_score: 7
        condition: "实现难度中等，依赖可控，无重大风险"
        keywords: ["中等", "可控", "常规"]
      - min_score: 2
        max_score: 4
        condition: "实现难度较高，存在跨部门协同成本，或数据基础不完善"
        keywords: ["难度高", "协同", "数据不完善", "复杂"]
      - min_score: 0
        max_score: 1
        condition: "实现难度极高，依赖复杂，存在技术瓶颈或重大风险"
        keywords: ["极高", "瓶颈", "重大风险", "不可行"]
